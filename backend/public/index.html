<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SmartCam Pro</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-user-select:none;user-select:none}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* LOGIN */
.login-screen{justify-content:center;align-items:center;padding:24px}
.logo{font-size:72px;margin-bottom:12px}
.app-title{font-size:28px;font-weight:bold;margin-bottom:4px}
.app-sub{font-size:14px;color:#64748b;margin-bottom:32px}
.input{width:100%;max-width:380px;padding:16px;background:#1a1a2e;border:1px solid #333;border-radius:14px;color:#fff;font-size:16px;margin-bottom:12px;outline:none;-webkit-appearance:none}
.input:focus{border-color:#6366f1}
.btn{width:100%;max-width:380px;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all 0.2s}
.btn:active{opacity:0.7;transform:scale(0.97)}
.btn-primary{background:#6366f1;color:#fff}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-dark{background:#1a1a2e;color:#94a3b8;border:1px solid #333}
.error{color:#ef4444;font-size:13px;text-align:center;margin-top:8px}
.tab-row{display:flex;gap:10px;width:100%;max-width:380px;margin-bottom:16px}
.tab-row .btn{margin-bottom:0}

/* HOME */
.home-header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;display:flex;align-items:center;gap:12px}
.home-header h1{font-size:20px;flex:1}
.cam-card{background:#1a1a2e;border-radius:16px;padding:16px;margin:8px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s}
.cam-card:active{transform:scale(0.98);background:#222}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.dot-on{background:#22c55e;box-shadow:0 0 8px #22c55e}
.dot-off{background:#555}
.cam-info{flex:1}
.cam-name{font-size:16px;font-weight:600}
.cam-stat{font-size:13px;margin-top:2px}
.section-title{font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:1px;padding:16px 16px 4px;font-weight:600}

/* LIVE VIEW */
.live-topbar{background:rgba(0,0,0,0.8);padding:12px 16px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:10}
.live-back{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px}
.live-title{flex:1;font-size:16px;font-weight:600}
.live-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-live{background:#166534;color:#22c55e}
.badge-off{background:#333;color:#888}
.badge-alarm{background:#7f1d1d;color:#ef4444;animation:blink 0.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.video-container{flex:1;display:flex;align-items:center;justify-content:center;background:#000;margin-top:50px;position:relative;overflow:hidden}
.video-container img{width:100%;height:auto;max-height:calc(100vh - 180px);object-fit:contain}
.video-placeholder{text-align:center;padding:40px}
.video-placeholder .icon{font-size:80px;margin-bottom:12px}
.video-placeholder p{color:#64748b;font-size:14px}

/* CONTROLS */
.controls-bar{background:rgba(0,0,0,0.9);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:fixed;bottom:0;left:0;right:0;z-index:10;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border:none;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;min-width:64px;transition:all 0.2s;color:#fff}
.ctrl-btn:active{transform:scale(0.9)}
.ctrl-btn .icon{font-size:22px}
.ctrl-btn.dark{background:#1a1a2e}
.ctrl-btn.green{background:#166534}
.ctrl-btn.red{background:#7f1d1d}
.ctrl-btn.purple{background:#4c1d95}
.ctrl-btn.active{background:#22c55e;color:#000}
.ctrl-btn.alarm-active{background:#ef4444;animation:blink 0.5s infinite}

.battery-badge{position:fixed;top:56px;right:16px;background:rgba(0,0,0,0.7);padding:4px 10px;border-radius:8px;font-size:11px;color:#94a3b8;z-index:11}
.event-popup{position:fixed;top:60px;left:16px;right:16px;background:#7f1d1d;border-radius:12px;padding:14px;z-index:20;display:none;animation:slideDown 0.3s}
.event-popup.show{display:block}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.event-popup h3{font-size:15px;margin-bottom:4px}
.event-popup p{font-size:12px;color:#fca5a5}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen login-screen active">
  <div class="logo">📹</div>
  <div class="app-title">SmartCam Pro</div>
  <div class="app-sub">Sicherheits-Kamera System</div>
  <input id="email" class="input" type="email" placeholder="E-Mail" autocomplete="email">
  <input id="pass" class="input" type="password" placeholder="Passwort" autocomplete="current-password">
  <input id="name" class="input" type="text" placeholder="Anzeigename" style="display:none">
  <div class="tab-row">
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">Anmelden</button>
    <button class="btn btn-dark" onclick="toggleReg()">Registrieren</button>
  </div>
  <div id="loginErr" class="error"></div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="home-header">
    <div style="font-size:28px">📹</div>
    <h1>SmartCam Pro</h1>
    <button class="btn btn-dark" onclick="logout()" style="width:auto;padding:8px 16px;font-size:13px;margin:0">Abmelden</button>
  </div>
  <div class="section-title">Kameras</div>
  <div id="camList"></div>
  <div id="emptyState" style="display:none;text-align:center;padding:60px 20px">
    <div style="font-size:64px;margin-bottom:16px">📷</div>
    <p style="font-size:16px;font-weight:600;margin-bottom:8px">Keine Kameras</p>
    <p style="font-size:14px;color:#64748b">Starte eine Kamera auf einem Android-Gerät</p>
  </div>
</div>

<!-- LIVE VIEW -->
<div id="liveScreen" class="screen">
  <div class="live-topbar">
    <button class="live-back" onclick="leaveLive()">←</button>
    <div class="live-title" id="liveTitle">Kamera</div>
    <div class="live-badge badge-off" id="liveBadge">Verbinde...</div>
  </div>
  <div class="battery-badge" id="batteryBadge">🔋 --</div>
  <div class="event-popup" id="eventPopup">
    <h3 id="eventTitle">🚨 ALARM</h3>
    <p id="eventMsg">Bewegung erkannt!</p>
  </div>
  <div class="video-container" id="videoContainer">
    <div class="video-placeholder" id="videoPlaceholder">
      <div class="icon">📹</div>
      <p>Warte auf Live-Stream...</p>
      <p style="margin-top:8px;font-size:12px;color:#444">Kamera muss online sein</p>
    </div>
    <img id="liveFrame" style="display:none" alt="Live">
  </div>
  <div class="controls-bar">
    <button class="ctrl-btn purple" onclick="showQR()">
      <span class="icon">📱</span>QR
    </button>
    <button class="ctrl-btn dark" id="btnFlash" onclick="toggleFlash()">
      <span class="icon">🔦</span>Licht
    </button>
    <button class="ctrl-btn dark" id="btnSwitch" onclick="switchCam()">
      <span class="icon">🔄</span>Drehen
    </button>
    <button class="ctrl-btn dark" id="btnAudio" onclick="toggleAudio()">
      <span class="icon">🔊</span>Hören
    </button>
    <button class="ctrl-btn red" onclick="sendAlarm()">
      <span class="icon">🚨</span>Alarm
    </button>
  </div>
</div>

<script>
const API = location.origin;
let token = localStorage.getItem('sc_t');
let userId = localStorage.getItem('sc_uid');
let userName = localStorage.getItem('sc_un');
let isReg = false;
let socket = null;
let currentCamId = '';
let cameras = [];
let flashOn = false;
let audioOn = false;
let audioCtx = null;

if (token && userId) { showHome(); }

function $(id) { return document.getElementById(id); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); }

function toggleReg() {
  isReg = !isReg;
  $('name').style.display = isReg ? 'block' : 'none';
  $('loginBtn').textContent = isReg ? 'Registrieren' : 'Anmelden';
  $('loginErr').textContent = '';
}

async function doLogin() {
  const email = $('email').value.trim();
  const pass = $('pass').value;
  const name = $('name').value.trim();
  if (!email || !pass) { $('loginErr').textContent = 'Alles ausfüllen'; return; }
  try {
    const url = isReg ? '/api/auth/register' : '/api/auth/login';
    const body = isReg ? { email, password: pass, display_name: name || null } : { email, password: pass };
    const res = await fetch(API + url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { $('loginErr').textContent = data.error || 'Fehler'; return; }
    token = data.accessToken;
    userId = data.user.id;
    userName = data.user.displayName || data.user.display_name || email.split('@')[0];
    localStorage.setItem('sc_t', token);
    localStorage.setItem('sc_uid', userId);
    localStorage.setItem('sc_un', userName);
    showHome();
  } catch (e) { $('loginErr').textContent = 'Server nicht erreichbar'; }
}

function logout() {
  token = userId = userName = '';
  localStorage.clear();
  if (socket) socket.disconnect();
  showScreen('loginScreen');
}

function showHome() {
  showScreen('homeScreen');
  loadCameras();
}

async function loadCameras() {
  try {
    const res = await fetch(API + '/api/cameras/', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.status === 401) { logout(); return; }
    cameras = await res.json();
    const list = $('camList');
    const empty = $('emptyState');
    if (!cameras.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    list.innerHTML = cameras.map(c => `
      <div class="cam-card" onclick="joinLive('${c.id}','${esc(c.name)}')">
        <div class="dot ${c.status==='online'?'dot-on':'dot-off'}"></div>
        <div class="cam-info">
          <div class="cam-name">${esc(c.name)}</div>
          <div class="cam-stat" style="color:${c.status==='online'?'#22c55e':'#64748b'}">${c.status==='online'?'● Live':'● Offline'}</div>
        </div>
        ${c.status==='online'?'<span style="color:#22c55e;font-size:20px">▶</span>':''}
      </div>
    `).join('');
  } catch(e) {}
}

function joinLive(camId, camName) {
  currentCamId = camId;
  $('liveTitle').textContent = camName;
  $('liveBadge').className = 'live-badge badge-off';
  $('liveBadge').textContent = 'Verbinde...';
  $('liveFrame').style.display = 'none';
  $('videoPlaceholder').style.display = 'block';
  flashOn = false; audioOn = false;
  $('btnFlash').className = 'ctrl-btn dark';
  $('btnAudio').className = 'ctrl-btn dark';
  showScreen('liveScreen');
  connectSocket(camId);
}

function connectSocket(camId) {
  if (socket) { socket.disconnect(); socket = null; }
  socket = io(API, { auth: { token }, reconnection: true, reconnectionAttempts: 10, reconnectionDelay: 2000 });

  socket.on('connect', () => {
    $('liveBadge').className = 'live-badge badge-live';
    $('liveBadge').textContent = '● Live';
    socket.emit('watcher:join', camId);
  });

  socket.on('camera:frame', (data) => {
    if (data.frame) {
      $('liveFrame').src = 'data:image/jpeg;base64,' + data.frame;
      $('liveFrame').style.display = 'block';
      $('videoPlaceholder').style.display = 'none';
    }
  });

  socket.on('camera:audio', (data) => {
    if (audioOn && data.audio) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
        audioCtx.decodeAudioData(bytes.buffer).then(buf => {
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          src.connect(audioCtx.destination);
          src.start();
        }).catch(() => {});
      } catch(e) {}
    }
  });

  socket.on('camera:status', (data) => {
    const b = $('liveBadge');
    if (data.status === 'online') { b.className = 'live-badge badge-live'; b.textContent = '● Live'; }
    else { b.className = 'live-badge badge-off'; b.textContent = '● Offline'; $('liveFrame').style.display = 'none'; $('videoPlaceholder').style.display = 'block'; }
  });

  socket.on('camera:alarm', (data) => {
    showEvent('🚨 ALARM!', data.message || 'Alarm ausgelöst!');
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'square'; g.gain.value = 0.3;
      osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 2000);
    } catch(e) {}
    if (navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
    $('liveBadge').className = 'live-badge badge-alarm';
    $('liveBadge').textContent = '🚨 ALARM!';
  });

  socket.on('camera:motion', (data) => {
    showEvent('👁 Bewegung', data.type || 'Bewegung erkannt');
    if (navigator.vibrate) navigator.vibrate(200);
  });

  socket.on('camera:battery', (data) => {
    $('batteryBadge').textContent = '🔋 ' + data.level + '%';
  });

  socket.on('disconnect', () => {
    $('liveBadge').className = 'live-badge badge-off';
    $('liveBadge').textContent = '● Getrennt';
  });
}

function toggleFlash() {
  flashOn = !flashOn;
  $('btnFlash').className = flashOn ? 'ctrl-btn green active' : 'ctrl-btn dark';
  $('btnFlash').querySelector('.icon').textContent = flashOn ? '🔦' : '🔦';
  if (socket && currentCamId) socket.emit('remote:flash', { cameraId: currentCamId, on: flashOn });
}

function switchCam() {
  if (socket && currentCamId) socket.emit('remote:switch', { cameraId: currentCamId });
}

function toggleAudio() {
  audioOn = !audioOn;
  $('btnAudio').className = audioOn ? 'ctrl-btn green active' : 'ctrl-btn dark';
  $('btnAudio').querySelector('.icon').textContent = audioOn ? '🔊' : '🔇';
}

function sendAlarm() {
  if (socket && currentCamId) {
    socket.emit('remote:alarm', { cameraId: currentCamId, message: 'Alarm vom iPhone!' });
    showEvent('🚨 Alarm gesendet!', 'An Kamera gesendet');
    if (navigator.vibrate) navigator.vibrate(500);
  }
}

function showEvent(title, msg) {
  $('eventTitle').textContent = title;
  $('eventMsg').textContent = msg;
  $('eventPopup').className = 'event-popup show';
  setTimeout(() => { $('eventPopup').className = 'event-popup'; }, 5000);
}

function leaveLive() {
  if (socket) { socket.emit('watcher:leave', currentCamId); socket.disconnect(); socket = null; }
  currentCamId = '';
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  showHome();
}

function showQR() {
  if (!currentCamId) return;
  const data = JSON.stringify({ server: API, camera: currentCamId, token });
  const url = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(data);
  const popup = document.createElement('div');
  popup.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  popup.innerHTML = `
    <p style="font-size:18px;font-weight:600;margin-bottom:16px">📱 QR-Code</p>
    <img src="${url}" style="width:260px;height:260px;border-radius:16px;background:#fff;padding:12px">
    <p style="color:#94a3b8;margin-top:16px;font-size:14px;text-align:center">Scanne mit der Android-App</p>
    <button onclick="this.parentElement.remove()" style="margin-top:20px;padding:12px 32px;background:#333;color:#fff;border:none;border-radius:10px;font-size:16px">Schließen</button>
  `;
  document.body.appendChild(popup);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Auto-refresh cameras
setInterval(() => { if (token && document.getElementById('homeScreen').classList.contains('active')) loadCameras(); }, 5000);
</script>
</body>
</html>
