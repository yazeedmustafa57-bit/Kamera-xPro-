name: Build SmartCam Pro APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew
        working-directory: .

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android-app

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android-app

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartCamPro-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartCamPro-release
          path: android-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
